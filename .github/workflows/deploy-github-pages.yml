# Build static export (out/) and deploy to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Optional: LaunchDarkly client ID (same as .env.local). Repo → Settings → Secrets → Actions.
          NEXT_PUBLIC_LAUNCHDARKLY_CLIENT_SIDE_ID: ${{ secrets.NEXT_PUBLIC_LAUNCHDARKLY_CLIENT_SIDE_ID }}
          # For https://<user>.github.io/<repo>/ set repo variable NEXT_PUBLIC_BASE_PATH to /repo (e.g. /traveld).
          # For a root domain or username.github.io user site with no subpath, leave the variable unset/empty.
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

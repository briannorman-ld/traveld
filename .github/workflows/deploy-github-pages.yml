# Build static export (out/) and deploy to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      # Project Pages live at github.io/<repo>/ — Next needs basePath or CSS/JS 404 at site root.
      - name: Set base path for GitHub Pages
        id: pages_base
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          OVERRIDE="${{ vars.NEXT_PUBLIC_BASE_PATH }}"
          if [ -n "$OVERRIDE" ]; then
            echo "path=$OVERRIDE" >> "$GITHUB_OUTPUT"
          elif [[ "${REPO,,}" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static site
        run: npm run build
        env:
          # Optional: LaunchDarkly client ID (same as .env.local). Repo → Settings → Secrets → Actions.
          NEXT_PUBLIC_LAUNCHDARKLY_CLIENT_SIDE_ID: ${{ secrets.NEXT_PUBLIC_LAUNCHDARKLY_CLIENT_SIDE_ID }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages_base.outputs.path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
